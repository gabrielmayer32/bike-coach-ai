  #     prescribed: "What was prescribed"
  #     athlete_level: intermediate   # beginner / intermediate / advanced / elite
  #     training_phase: build         # base / build / peak / taper
  #   computed_summary:
  #     avg_power_W: 210
  #     rpe: 6
  #     # add any other metrics that are relevant
